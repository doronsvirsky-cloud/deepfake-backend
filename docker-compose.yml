version: "3.9"

services:

  db:
    image: postgres:15
    container_name: deepfake-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deepfake
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  api:
    build: .
    container_name: deepfake-api
    restart: always
    depends_on:
      - db
    ports:
      - "4000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/deepfake

volumes:
  pgdata: